<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메시지 - 집으로</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="screen dashboard-screen">

      <div class="top-bar">
        <div class="top-bar-title">마음 보내기</div>
        <div style="font-size: 12px; color: var(--primary-dark); font-weight: 700;">💎 240p</div>
      </div>

      <div class="scroll-area">

        <div class="section-label">받는 사람</div>
        <div class="recipient-row">
          <div class="recipient-chip selected">👩 엄마</div>
          <div class="recipient-chip">👨 아빠</div>
          <div class="recipient-chip">🧑 오빠</div>
          <div class="recipient-chip">👪 가족 모두</div>
        </div>

        <div class="section-label">프리셋 메시지 · 하루 3회 (10점)</div>
        <div class="preset-grid">
          <div class="preset-card">
            <div class="preset-emoji">❤️</div>
            <div class="preset-text">사랑해요</div>
            <div class="preset-points">+10p</div>
          </div>
          <div class="preset-card">
            <div class="preset-emoji">🤗</div>
            <div class="preset-text">보고싶어요</div>
            <div class="preset-points">+10p</div>
          </div>
          <div class="preset-card">
            <div class="preset-emoji">🙏</div>
            <div class="preset-text">고마워요</div>
            <div class="preset-points">+10p</div>
          </div>
          <div class="preset-card">
            <div class="preset-emoji">😊</div>
            <div class="preset-text">잘 지내요?</div>
            <div class="preset-points">+10p</div>
          </div>
          <div class="preset-card">
            <div class="preset-emoji">🌸</div>
            <div class="preset-text">오늘도 화이팅</div>
            <div class="preset-points">+10p</div>
          </div>
          <div class="preset-card">
            <div class="preset-emoji">🍚</div>
            <div class="preset-text">밥 챙기세요</div>
            <div class="preset-points">+10p</div>
          </div>
        </div>

        <div class="section-label">직접 쓰기 (0점)</div>
        <textarea class="input" placeholder="마음을 직접 표현해보세요"></textarea>

        <button class="btn btn-primary" style="margin-top: 16px;">보내기</button>

      </div>

      <div class="tab-bar">
        <a href="dashboard.html" class="tab-item">
          <div class="tab-icon">🏠</div>
          <div class="tab-label">홈</div>
        </a>
        <a href="calendar.html" class="tab-item">
          <div class="tab-icon">📅</div>
          <div class="tab-label">캘린더</div>
        </a>
        <a href="message.html" class="tab-item active">
          <div class="tab-icon">💬</div>
          <div class="tab-label">메시지</div>
        </a>
        <a href="plant.html" class="tab-item">
          <div class="tab-icon">🌱</div>
          <div class="tab-label">식물</div>
        </a>
        <a href="mypage.html" class="tab-item">
          <div class="tab-icon">👤</div>
          <div class="tab-label">마이</div>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
