<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가족 시작하기 - 집으로</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="screen">
      <div class="header">
        <a href="signup.html" class="back-btn">←</a>
        <h2 class="header-title">가족 시작하기</h2>
      </div>

      <div style="margin-bottom: 28px;">
        <p style="font-size: 14px; color: var(--text-sub); line-height: 1.6;">
          가족 그룹을 새로 만들거나<br>
          이미 있는 그룹에 참여할 수 있어요
        </p>
      </div>

      <a href="dashboard.html" class="invite-option">
        <div class="invite-option-icon">🏡</div>
        <div class="invite-option-title">새 가족 그룹 만들기</div>
        <div class="invite-option-desc">
          가족 코드를 만들어서 다른 가족을<br>초대해보세요
        </div>
      </a>

      <a href="dashboard.html" class="invite-option">
        <div class="invite-option-icon">🔑</div>
        <div class="invite-option-title">가족 코드로 참여</div>
        <div class="invite-option-desc">
          가족이 알려준 6자리 코드를<br>입력해주세요
        </div>
      </a>

      <div style="flex: 1;"></div>

      <a href="dashboard.html" class="link-area" style="display:block;">
        <span class="link">건너뛰고 시작하기</span>
      </a>
    </div>
  </div>
</body>
</html>
