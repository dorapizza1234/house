<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 집으로</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="screen">
      <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h2 class="header-title">로그인</h2>
      </div>

      <div class="logo-area" style="margin-top: 40px; margin-bottom: 50px;">
        <div class="logo">집으로</div>
        <div class="logo-sub">다시 오신 걸 환영해요</div>
      </div>

      <form class="form" style="flex: initial;">
        <div class="form-group">
          <label class="label" for="email">이메일</label>
          <input class="input" id="email" type="email" placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label class="label" for="password">비밀번호</label>
          <input class="input" id="password" type="password" placeholder="비밀번호 입력">
        </div>
      </form>

      <div style="flex: 1;"></div>

      <a href="dashboard.html" class="btn btn-primary">로그인</a>

      <div class="link-area">
        <span class="link-text">아직 계정이 없으신가요? </span>
        <a href="signup.html" class="link">회원가입</a>
      </div>
    </div>
  </div>
</body>
</html>
