<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리집 식물 - 집으로</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="screen dashboard-screen">

      <div class="top-bar">
        <div class="top-bar-title">우리집 식물</div>
      </div>

      <div class="scroll-area">

        <div class="plant-hero">
          <div class="plant-hero-illust">🌿</div>
          <div class="plant-hero-name">하루팡</div>
          <div class="plant-hero-meta">함께한 지 12일째</div>
          <div class="plant-status-badge">건강함</div>
        </div>

        <div style="font-size: 13px; color: var(--text-sub); margin-bottom: 10px; line-height: 1.6;">
          24시간 안에 물을 줘야 시들지 않아요.<br>
          가족 누구든 물을 줄 수 있어요.
        </div>

        <button class="water-btn-large">💧 지금 물 주기</button>

        <div class="section" style="margin-top: 28px;">
          <div class="section-title">최근 물주기 기록</div>
          <div class="water-log-list">
            <div class="water-log-item">
              <div class="water-log-icon">💧</div>
              <div class="water-log-text"><strong>나</strong>가 물을 줬어요</div>
              <div class="water-log-time">2시간 전</div>
            </div>
            <div class="water-log-item">
              <div class="water-log-icon">💧</div>
              <div class="water-log-text"><strong>엄마</strong>가 물을 줬어요</div>
              <div class="water-log-time">어제</div>
            </div>
            <div class="water-log-item">
              <div class="water-log-icon">💧</div>
              <div class="water-log-text"><strong>아빠</strong>가 물을 줬어요</div>
              <div class="water-log-time">3일 전</div>
            </div>
            <div class="water-log-item">
              <div class="water-log-icon">💧</div>
              <div class="water-log-text"><strong>오빠</strong>가 물을 줬어요</div>
              <div class="water-log-time">5일 전</div>
            </div>
          </div>
        </div>

      </div>

      <div class="tab-bar">
        <a href="dashboard.html" class="tab-item">
          <div class="tab-icon">🏠</div>
          <div class="tab-label">홈</div>
        </a>
        <a href="calendar.html" class="tab-item">
          <div class="tab-icon">📅</div>
          <div class="tab-label">캘린더</div>
        </a>
        <a href="message.html" class="tab-item">
          <div class="tab-icon">💬</div>
          <div class="tab-label">메시지</div>
        </a>
        <a href="plant.html" class="tab-item active">
          <div class="tab-icon">🌱</div>
          <div class="tab-label">식물</div>
        </a>
        <a href="mypage.html" class="tab-item">
          <div class="tab-icon">👤</div>
          <div class="tab-label">마이</div>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
