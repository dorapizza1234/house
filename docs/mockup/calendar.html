<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캘린더 - 집으로</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="screen dashboard-screen">

      <div class="top-bar">
        <div class="top-bar-title">가족 캘린더</div>
        <div class="top-bar-icon">＋</div>
      </div>

      <div class="scroll-area">

        <div class="cal-header">
          <button class="cal-nav-btn">◀</button>
          <div class="cal-month-title">2026년 4월</div>
          <button class="cal-nav-btn">▶</button>
        </div>

        <div class="cal-weekdays">
          <div class="cal-weekday sun">일</div>
          <div class="cal-weekday">월</div>
          <div class="cal-weekday">화</div>
          <div class="cal-weekday">수</div>
          <div class="cal-weekday">목</div>
          <div class="cal-weekday">금</div>
          <div class="cal-weekday sat">토</div>
        </div>

        <div class="cal-grid">
          <div class="cal-cell muted">29</div>
          <div class="cal-cell muted">30</div>
          <div class="cal-cell muted">31</div>
          <div class="cal-cell">1</div>
          <div class="cal-cell">2</div>
          <div class="cal-cell">3</div>
          <div class="cal-cell">4</div>

          <div class="cal-cell">5</div>
          <div class="cal-cell">6</div>
          <div class="cal-cell">7</div>
          <div class="cal-cell has-event">8</div>
          <div class="cal-cell">9</div>
          <div class="cal-cell">10</div>
          <div class="cal-cell">11</div>

          <div class="cal-cell">12</div>
          <div class="cal-cell">13</div>
          <div class="cal-cell">14</div>
          <div class="cal-cell has-event">15</div>
          <div class="cal-cell">16</div>
          <div class="cal-cell">17</div>
          <div class="cal-cell">18</div>

          <div class="cal-cell">19</div>
          <div class="cal-cell">20</div>
          <div class="cal-cell">21</div>
          <div class="cal-cell">22</div>
          <div class="cal-cell">23</div>
          <div class="cal-cell">24</div>
          <div class="cal-cell">25</div>

          <div class="cal-cell">26</div>
          <div class="cal-cell">27</div>
          <div class="cal-cell">28</div>
          <div class="cal-cell today has-event">29</div>
          <div class="cal-cell">30</div>
          <div class="cal-cell muted">1</div>
          <div class="cal-cell muted">2</div>
        </div>

        <div class="section">
          <div class="section-title">4월 29일 오늘</div>
          <div class="schedule-card">
            <div class="schedule-icon">🎂</div>
            <div class="schedule-text">엄마 생신</div>
            <div class="schedule-time">하루 종일</div>
          </div>
          <div class="schedule-card">
            <div class="schedule-icon">📅</div>
            <div class="schedule-text">아빠 회식</div>
            <div class="schedule-time">19:00</div>
          </div>
        </div>

      </div>

      <div class="tab-bar">
        <a href="dashboard.html" class="tab-item">
          <div class="tab-icon">🏠</div>
          <div class="tab-label">홈</div>
        </a>
        <a href="calendar.html" class="tab-item active">
          <div class="tab-icon">📅</div>
          <div class="tab-label">캘린더</div>
        </a>
        <a href="message.html" class="tab-item">
          <div class="tab-icon">💬</div>
          <div class="tab-label">메시지</div>
        </a>
        <a href="plant.html" class="tab-item">
          <div class="tab-icon">🌱</div>
          <div class="tab-label">식물</div>
        </a>
        <a href="mypage.html" class="tab-item">
          <div class="tab-icon">👤</div>
          <div class="tab-label">마이</div>
        </a>
      </div>

    </div>
  </div>
</body>
</html>
